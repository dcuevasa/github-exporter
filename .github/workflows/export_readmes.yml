name: Export GitHub Data with Readmes

on:
  workflow_dispatch:

jobs:
  export-data-with-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run export script
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GHP_TOKEN }}
        run: python export_readmes.py

      - name: Upload JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-export-with-readmes-json
          path: github_export_with_readmes.json